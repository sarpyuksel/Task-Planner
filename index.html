<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Style Task & Weekly Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fbfbfa; color: #37352f; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(55, 53, 47, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(55, 53, 47, 0.2); }
        
        select.status-select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='black' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position-x: 100%;
            background-position-y: 50%;
            padding-right: 20px;
        }

        /* Sürüklenen kartın geçiş efektleri */
        .draggable-card {
            cursor: grab;
        }
        .draggable-card:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const defaultCategories = [
            { name: "Yazılım", color: "#e3e2e0", text: "#37352f" },
            { name: "Kitap", color: "#f1e0e0", text: "#5c2b29" },
            { name: "Spor", color: "#faebdd", text: "#6e361a" }
        ];

        const pastelColors = [
            { color: "#fdecc8", text: "#402c1b" }, { color: "#e8deee", text: "#412454" },
            { color: "#ffe2dd", text: "#5d1715" }, { color: "#d3e5ef", text: "#183347" },
            { color: "#dbeddb", text: "#1c3829" }, { color: "#fbf3db", text: "#694e1d" }
        ];

        const PRIORITIES = ["Çok Düşük", "Düşük", "Orta", "Yüksek", "Çok Yüksek"];
        const STATUSES = ["Not Started", "In Progress", "Done"];

        const priorityStyles = {
            "Çok Düşük": { bg: "#f0f9ff", border: "#bae6fd", text: "#0369a1" }, 
            "Düşük": { bg: "#e0f2fe", border: "#7dd3fc", text: "#0284c7" },     
            "Orta": { bg: "#fefce8", border: "#fde047", text: "#a16207" },     
            "Yüksek": { bg: "#fee2e2", border: "#fca5a5", text: "#b91c1c" },    
            "Çok Yüksek": { bg: "#fecaca", border: "#f87171", text: "#991b1b" } 
        };

        const statusStyles = {
            "Not Started": "bg-neutral-100 text-neutral-600 border-neutral-200",
            "In Progress": "bg-blue-100 text-blue-700 border-blue-200",
            "Done": "bg-green-100 text-green-700 border-green-200"
        };

        const DAYS_OF_WEEK = ["Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi", "Pazar"];

        function App() {
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem("notion_categories");
                return saved ? JSON.parse(saved) : defaultCategories;
            });

            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem("notion_tasks");
                return saved ? JSON.parse(saved) : [];
            });

            const [weeklyPlan, setWeeklyPlan] = useState(() => {
                const saved = localStorage.getItem("notion_weekly_plan");
                const initial = { "Pazartesi": [], "Salı": [], "Çarşamba": [], "Perşembe": [], "Cuma": [], "Cumartesi": [], "Pazar": [] };
                return saved ? JSON.parse(saved) : initial;
            });

            const [activeView, setActiveView] = useState("tasks");
            const [selectedTaskId, setSelectedTaskId] = useState(null);
            const [filterCategory, setFilterCategory] = useState("Hepsi");
            const [planningDay, setPlanningDay] = useState(null);

            const [showAddForm, setShowAddForm] = useState(false);
            const [newTitle, setNewTitle] = useState("");
            const [newCategory, setNewCategory] = useState(categories[0]?.name || "");
            const [newDetails, setNewDetails] = useState("");
            const [newPriority, setNewPriority] = useState("Orta");
            const [newStatus, setNewStatus] = useState("Not Started");

            const [showAddCategory, setShowAddCategory] = useState(false);
            const [newCategoryName, setNewCategoryName] = useState("");

            // SÜRÜKLE BIRAK (DRAG & DROP) REFERANSLARI
            const dragItem = useRef(null);
            const dragOverItem = useRef(null);

            useEffect(() => { localStorage.setItem("notion_categories", JSON.stringify(categories)); }, [categories]);
            useEffect(() => { localStorage.setItem("notion_tasks", JSON.stringify(tasks)); }, [tasks]);
            useEffect(() => { localStorage.setItem("notion_weekly_plan", JSON.stringify(weeklyPlan)); }, [weeklyPlan]);

            // --- SÜRÜKLE BIRAK FONKSİYONLARI ---
            const handleDragStart = (e, day, index) => {
                dragItem.current = { day, index };
                // Sürüklenen öğeyi hafif transparan yapalım
                setTimeout(() => { e.target.style.opacity = '0.4'; }, 0);
            };

            const handleDragEnter = (e, day, index) => {
                // Fare bir kartın üstüne geldiğinde o anki konumu kaydedelim
                dragOverItem.current = { day, index };
            };

            const handleDragEnd = (e) => {
                // Fare tuşu bırakıldığında (drop çalışsa da çalışmasa da) stili temizleyelim
                e.target.style.opacity = '1';
                dragItem.current = null;
                dragOverItem.current = null;
            };

            const handleDrop = (e, targetDay) => {
                e.preventDefault();
                if (!dragItem.current) return;

                const sourceDay = dragItem.current.day;
                const sourceIndex = dragItem.current.index;
                
                // Eğer doğrudan bir kartın üstüne bırakıldıysa onun indexini al, 
                // Eğer kartların değil boş alanın/kolonun üstüne bırakıldıysa en sona ekle.
                let destIndex = weeklyPlan[targetDay].length;
                if (dragOverItem.current && dragOverItem.current.day === targetDay) {
                    destIndex = dragOverItem.current.index;
                }

                // Kendi üstüne bırakıldıysa bir şey yapma
                if (sourceDay === targetDay && sourceIndex === destIndex) return;

                // Haftalık planın kopyasını oluşturup veriyi yer değiştirelim
                const newPlan = { ...weeklyPlan };
                const itemToMove = newPlan[sourceDay][sourceIndex];
                
                // Eski yerinden çıkar
                newPlan[sourceDay].splice(sourceIndex, 1);
                // Yeni yerine ekle
                newPlan[targetDay].splice(destIndex, 0, itemToMove);
                
                setWeeklyPlan(newPlan);
            };
            // ------------------------------------

            const handleAddCategory = (e) => {
                e.preventDefault();
                const trimmedName = newCategoryName.trim();
                if (!trimmedName) return;
                if (categories.find(c => c.name.toLowerCase() === trimmedName.toLowerCase())) {
                    alert("Bu kategori zaten mevcut!"); return;
                }
                const randomColor = pastelColors[Math.floor(Math.random() * pastelColors.length)];
                setCategories([...categories, { name: trimmedName, color: randomColor.color, text: randomColor.text }]);
                setNewCategoryName(""); setShowAddCategory(false);
            };

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newTitle.trim()) return;
                const newTask = { 
                    id: "task_" + Date.now(), title: newTitle, category: newCategory || categories[0].name, 
                    details: newDetails, priority: newPriority, status: newStatus, subTasks: [] 
                };
                setTasks([newTask, ...tasks]);
                setNewTitle(""); setNewDetails(""); setNewPriority("Orta"); setNewStatus("Not Started"); setShowAddForm(false);
            };

            const handleDeleteTask = (taskId) => {
                if (window.confirm("Bu görevi silmek istediğinize emin misiniz?")) {
                    setTasks(tasks.filter(t => t.id !== taskId));
                    if (selectedTaskId === taskId) setSelectedTaskId(null);
                    const updatedPlan = { ...weeklyPlan };
                    Object.keys(updatedPlan).forEach(day => {
                        updatedPlan[day] = updatedPlan[day].filter(item => item.taskId !== taskId);
                    });
                    setWeeklyPlan(updatedPlan);
                }
            };

            const updateTaskStatus = (taskId, status) => { setTasks(tasks.map(t => t.id === taskId ? { ...t, status } : t)); };
            const updateTaskPriority = (taskId, priority) => { setTasks(tasks.map(t => t.id === taskId ? { ...t, priority } : t)); };

            const toggleSubTask = (taskId, subTaskId) => {
                setTasks(tasks.map(task => {
                    if (task.id === taskId) {
                        return { ...task, subTasks: task.subTasks.map(sub => sub.id === subTaskId ? { ...sub, isCompleted: !sub.isCompleted } : sub) };
                    }
                    return task;
                }));
            };

            const addSubTask = (taskId, title) => {
                if (!title.trim()) return;
                setTasks(tasks.map(task => {
                    if (task.id === taskId) {
                        return { ...task, subTasks: [...task.subTasks, { id: "sub_" + Date.now(), title, isCompleted: false }] };
                    }
                    return task;
                }));
            };

            const deleteSubTask = (taskId, subTaskId) => {
                setTasks(tasks.map(task => {
                    if (task.id === taskId) {
                        return { ...task, subTasks: task.subTasks.filter(sub => sub.id !== subTaskId) };
                    }
                    return task;
                }));
                const updatedPlan = { ...weeklyPlan };
                Object.keys(updatedPlan).forEach(day => {
                    updatedPlan[day] = updatedPlan[day].filter(item => item.subTaskId !== subTaskId);
                });
                setWeeklyPlan(updatedPlan);
            };

            const addToWeeklyPlan = (day, taskId, subTaskId = null) => {
                const newItem = { id: "wp_" + Date.now(), taskId, subTaskId };
                setWeeklyPlan({ ...weeklyPlan, [day]: [...weeklyPlan[day], newItem] });
                setPlanningDay(null);
            };

            const removeFromWeeklyPlan = (day, itemId) => {
                setWeeklyPlan({ ...weeklyPlan, [day]: weeklyPlan[day].filter(item => item.id !== itemId) });
            };

            const currentSelectedTask = tasks.find(t => t.id === selectedTaskId);

            return (
                <div className="flex h-screen overflow-hidden select-none">
                    {/* SIDEBAR */}
                    <div className="w-64 bg-[#f3f3f2] border-r border-[#e8e8e8] flex flex-col justify-between p-3 shrink-0">
                        <div>
                            <div className="flex items-center space-x-2 px-2 py-3 mb-4 rounded-md hover:bg-[#e8e8e7] cursor-pointer transition">
                                <div className="w-6 h-6 rounded-full bg-neutral-700 text-white flex items-center justify-center text-xs font-bold">🎯</div>
                                <span className="font-semibold text-sm text-[#37352f]">Çalışma Alanım</span>
                            </div>
                            <nav className="space-y-1">
                                <button onClick={() => setActiveView("tasks")} className={`w-full flex items-center space-x-3 px-3 py-2 text-sm font-medium rounded-md transition ${activeView === 'tasks' ? 'bg-[#e8e8e7] text-[#37352f]' : 'text-[#64625d] hover:bg-[#e8e8e7]'}`}>
                                    <span>Tüm Görevler</span>
                                </button>
                                <button onClick={() => setActiveView("weekly")} className={`w-full flex items-center space-x-3 px-3 py-2 text-sm font-medium rounded-md transition ${activeView === 'weekly' ? 'bg-[#e8e8e7] text-[#37352f]' : 'text-[#64625d] hover:bg-[#e8e8e7]'}`}>
                                    <span>Haftalık Plan</span>
                                </button>
                            </nav>
                        </div>
                    </div>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 flex flex-col overflow-hidden relative bg-[#fbfbfa]">
                        
                        {/* VIEW 1: TÜM GÖREVLER */}
                        {activeView === "tasks" && (
                            <div className="flex-1 overflow-y-auto p-10 max-w-5xl w-full mx-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h1 className="text-3xl font-bold tracking-tight text-[#37352f]">🎯 Tüm Görev Havuzu</h1>
                                    <button onClick={() => setShowAddForm(!showAddForm)} className="bg-[#2eaadc] hover:bg-[#1c92c1] text-white text-sm font-medium px-3 py-1.5 rounded shadow-sm transition">
                                        + Yeni Görev
                                    </button>
                                </div>

                                <div className="flex flex-wrap items-center gap-2 mb-8 border-b border-[#e8e8e8] pb-3">
                                    <button onClick={() => setFilterCategory("Hepsi")} className={`px-3 py-1 rounded text-xs font-medium transition ${filterCategory === "Hepsi" ? "bg-neutral-800 text-white" : "bg-neutral-100 text-neutral-600 hover:bg-neutral-200"}`}>Hepsi</button>
                                    
                                    {categories.map(cat => (
                                        <button key={cat.name} onClick={() => setFilterCategory(cat.name)} style={{ backgroundColor: filterCategory === cat.name ? cat.text : cat.color, color: filterCategory === cat.name ? '#ffffff' : cat.text }} className="px-3 py-1 rounded text-xs font-medium transition opacity-90 hover:opacity-100">
                                            {cat.name}
                                        </button>
                                    ))}

                                    {showAddCategory ? (
                                        <form onSubmit={handleAddCategory} className="flex items-center space-x-1 ml-2">
                                            <input type="text" autoFocus value={newCategoryName} onChange={e => setNewCategoryName(e.target.value)} placeholder="Kategori Adı..." className="border border-neutral-300 rounded px-2 py-0.5 text-xs outline-none focus:border-neutral-500 w-32" />
                                            <button type="submit" className="text-xs bg-neutral-200 hover:bg-neutral-300 px-2 py-1 rounded font-medium transition">Ekle</button>
                                            <button type="button" onClick={() => setShowAddCategory(false)} className="text-xs text-neutral-500 hover:text-neutral-800 px-1">✕</button>
                                        </form>
                                    ) : (
                                        <button onClick={() => setShowAddCategory(true)} className="px-3 py-1 ml-2 border border-dashed border-neutral-300 text-neutral-500 rounded text-xs font-medium hover:bg-neutral-50 transition">
                                            + Kategori Ekle
                                        </button>
                                    )}
                                </div>

                                {showAddForm && (
                                    <form onSubmit={handleAddTask} className="bg-white border border-[#e8e8e8] rounded-lg p-5 mb-6 shadow-sm space-y-4">
                                        <div className="grid grid-cols-4 gap-4">
                                            <div className="col-span-2">
                                                <label className="block text-xs font-medium text-neutral-500 mb-1">Görev Adı</label>
                                                <input type="text" value={newTitle} onChange={e => setNewTitle(e.target.value)} className="w-full border border-neutral-200 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500" required />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-neutral-500 mb-1">Kategori</label>
                                                <select value={newCategory} onChange={e => setNewCategory(e.target.value)} className="w-full border border-neutral-200 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500">
                                                    {categories.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-neutral-500 mb-1">Öncelik</label>
                                                <select value={newPriority} onChange={e => setNewPriority(e.target.value)} className="w-full border border-neutral-200 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500">
                                                    {PRIORITIES.map(p => <option key={p} value={p}>{p}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-neutral-500 mb-1">Detaylar / Notlar</label>
                                            <textarea value={newDetails} onChange={e => setNewDetails(e.target.value)} rows="2" className="w-full border border-neutral-200 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500 resize-none"></textarea>
                                        </div>
                                        <div className="flex justify-end space-x-2">
                                            <button type="button" onClick={() => setShowAddForm(false)} className="px-3 py-1.5 border border-neutral-200 text-neutral-600 text-sm rounded hover:bg-neutral-50">Vazgeç</button>
                                            <button type="submit" className="px-4 py-1.5 bg-[#2eaadc] text-white text-sm rounded hover:bg-[#1c92c1]">Havuzuna Ekle</button>
                                        </div>
                                    </form>
                                )}

                                <div className="space-y-2">
                                    {tasks.filter(t => filterCategory === "Hepsi" || t.category === filterCategory).map(task => {
                                        const catConfig = categories.find(c => c.name === task.category) || { color: "#e3e2e0", text: "#37352f" };
                                        const taskStatus = task.status || "Not Started";
                                        const taskPriority = task.priority || "Orta";
                                        const priorityColor = priorityStyles[taskPriority].text;

                                        return (
                                            <div key={task.id} onClick={() => setSelectedTaskId(task.id)} className="group flex items-center justify-between p-3 bg-white border border-[#e8e8e8] rounded-md hover:border-neutral-400 shadow-sm cursor-pointer transition">
                                                <div className="flex items-center space-x-3 truncate flex-1">
                                                    <span style={{ backgroundColor: catConfig.color, color: catConfig.text }} className="px-2 py-0.5 rounded text-xs font-semibold shrink-0">{task.category}</span>
                                                    <span className="font-medium text-sm text-[#37352f] truncate group-hover:text-blue-600">{task.title}</span>
                                                </div>
                                                
                                                <div className="flex items-center space-x-3 shrink-0">
                                                    <select 
                                                        value={taskStatus}
                                                        onClick={(e) => e.stopPropagation()} 
                                                        onChange={(e) => { e.stopPropagation(); updateTaskStatus(task.id, e.target.value); }}
                                                        className={`status-select text-[11px] font-semibold border rounded-full px-2.5 py-0.5 outline-none cursor-pointer transition ${statusStyles[taskStatus]}`}
                                                    >
                                                        {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                                    </select>
                                                    
                                                    <span style={{ color: priorityColor }} className="text-[11px] font-bold border border-transparent px-1">{taskPriority}</span>
                                                    
                                                    <button onClick={(e) => { e.stopPropagation(); handleDeleteTask(task.id); }} className="opacity-0 group-hover:opacity-100 text-red-500 hover:text-red-700 text-xs font-semibold">Sil</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* VIEW 2: HAFTALIK PLAN */}
                        {activeView === "weekly" && (
                            <div className="flex-1 overflow-x-auto p-10">
                                <h1 className="text-3xl font-bold tracking-tight text-[#37352f] mb-6 max-w-7xl mx-auto">📅 Haftalık Çizelge</h1>
                                <div className="grid grid-cols-7 gap-3 max-w-7xl mx-auto min-w-[1000px]">
                                    {DAYS_OF_WEEK.map(day => (
                                        <div 
                                            key={day} 
                                            // Kolonun Sürükle Bırak (Drop) Olayları
                                            onDragOver={(e) => e.preventDefault()} // Bırakmaya izin ver
                                            onDrop={(e) => handleDrop(e, day)}     // Bırakıldığında çalışacak fonksiyon
                                            className="bg-[#f7f7f5] rounded-xl p-3 border border-[#e8e8e8] flex flex-col h-[calc(100vh-180px)] transition-colors"
                                        >
                                            <div className="flex justify-between items-center mb-3 pb-1 border-b border-neutral-200">
                                                <span className="font-semibold text-sm text-neutral-700">{day}</span>
                                                <button onClick={() => setPlanningDay(day)} className="w-5 h-5 rounded hover:bg-neutral-200 flex items-center justify-center text-neutral-500 text-sm">+</button>
                                            </div>
                                            
                                            {/* Günün Kartları Burada Listelenir */}
                                            <div className="space-y-2 flex-1 overflow-y-auto pr-1 pb-10">
                                                {weeklyPlan[day]?.map((item, index) => {
                                                    const parentTask = tasks.find(t => t.id === item.taskId);
                                                    if (!parentTask) return null;
                                                    
                                                    const subTask = item.subTaskId ? parentTask.subTasks.find(s => s.id === item.subTaskId) : null;
                                                    const taskStatus = parentTask.status || "Not Started";
                                                    const taskPriority = parentTask.priority || "Orta";
                                                    const pStyle = priorityStyles[taskPriority];

                                                    return (
                                                        <div 
                                                            key={item.id} 
                                                            onClick={() => setSelectedTaskId(parentTask.id)}
                                                            
                                                            // KARTIN SÜRÜKLE BIRAK (DRAG) OLAYLARI
                                                            draggable
                                                            onDragStart={(e) => handleDragStart(e, day, index)}
                                                            onDragEnter={(e) => handleDragEnter(e, day, index)}
                                                            onDragEnd={handleDragEnd}
                                                            onDragOver={(e) => e.preventDefault()}

                                                            style={{ backgroundColor: pStyle.bg, borderColor: pStyle.border }}
                                                            className="draggable-card border rounded p-2.5 shadow-sm group hover:brightness-95 relative transition flex flex-col"
                                                        >
                                                            <button 
                                                                onClick={(e) => { e.stopPropagation(); removeFromWeeklyPlan(day, item.id); }} 
                                                                className="absolute top-1 right-1 opacity-0 group-hover:opacity-100 text-red-500 text-xs bg-white rounded-full w-4 h-4 flex items-center justify-center shadow"
                                                            >✕</button>
                                                            
                                                            {/* Kart İçeriği */}
                                                            {subTask ? (
                                                                <div className="pr-4 break-words mb-2 pointer-events-none">
                                                                    <div className="text-[10px] opacity-60 line-through mb-0.5">{parentTask.title}</div>
                                                                    <div className="text-xs font-semibold text-[#37352f] leading-snug">
                                                                        🔹 {subTask.title}
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className="text-xs font-semibold text-[#37352f] leading-snug pr-4 break-words mb-2 pointer-events-none">
                                                                    📌 {parentTask.title}
                                                                </div>
                                                            )}

                                                            <div className="mt-auto pt-1 border-t border-black/5 flex justify-between items-center">
                                                                <select 
                                                                    value={taskStatus}
                                                                    onClick={(e) => e.stopPropagation()}
                                                                    onChange={(e) => { e.stopPropagation(); updateTaskStatus(parentTask.id, e.target.value); }}
                                                                    className={`status-select text-[9px] font-bold border rounded-full px-1.5 py-0.5 outline-none cursor-pointer ${statusStyles[taskStatus]}`}
                                                                >
                                                                    {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                                                </select>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* SIDE PEEK: SAĞDAN KAYAN GÖREV DETAY PANELİ */}
                        <div className={`fixed top-0 right-0 h-full w-[400px] bg-white border-l border-[#e8e8e8] shadow-2xl transform transition-transform duration-300 z-50 flex flex-col ${currentSelectedTask ? 'translate-x-0' : 'translate-x-full'}`}>
                            {currentSelectedTask && (
                                <div className="flex-1 flex flex-col overflow-hidden p-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <div className="flex space-x-2">
                                            <select 
                                                value={currentSelectedTask.status || "Not Started"}
                                                onChange={(e) => updateTaskStatus(currentSelectedTask.id, e.target.value)}
                                                className={`status-select text-xs font-semibold border rounded-md px-2 py-1 outline-none cursor-pointer ${statusStyles[currentSelectedTask.status || "Not Started"]}`}
                                            >
                                                {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>

                                            <select 
                                                value={currentSelectedTask.priority || "Orta"}
                                                onChange={(e) => updateTaskPriority(currentSelectedTask.id, e.target.value)}
                                                className="text-xs font-semibold border border-neutral-200 rounded-md px-2 py-1 outline-none cursor-pointer bg-neutral-50"
                                            >
                                                {PRIORITIES.map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                        </div>
                                        <button onClick={() => setSelectedTaskId(null)} className="text-neutral-400 hover:text-neutral-600 text-xl">✕</button>
                                    </div>

                                    <h2 className="text-xl font-bold text-[#37352f] mb-2">{currentSelectedTask.title}</h2>
                                    <div className="text-sm text-neutral-500 bg-neutral-50 p-3 rounded mb-6 whitespace-pre-wrap">{currentSelectedTask.details || "Detay yok..."}</div>
                                    
                                    <h3 className="text-xs font-bold uppercase text-neutral-400 mb-2">📋 Alt Adımlar</h3>
                                    <input type="text" placeholder="+ Alt adım ekle (Enter)" onKeyDown={(e) => { if (e.key === 'Enter') { addSubTask(currentSelectedTask.id, e.target.value); e.target.value = ""; } }} className="w-full bg-neutral-50 border border-neutral-200 rounded px-3 py-1.5 text-xs mb-3" />
                                    <div className="flex-1 overflow-y-auto space-y-1.5">
                                        {currentSelectedTask.subTasks.map(sub => (
                                            <div key={sub.id} className="flex items-center justify-between p-2 rounded hover:bg-neutral-50 group">
                                                <label className="flex items-center space-x-2 cursor-pointer flex-1">
                                                    <input type="checkbox" checked={sub.isCompleted} onChange={() => toggleSubTask(currentSelectedTask.id, sub.id)} className="rounded" />
                                                    <span className={`text-xs ${sub.isCompleted ? 'line-through text-neutral-400' : 'text-neutral-700'}`}>{sub.title}</span>
                                                </label>
                                                <button onClick={() => deleteSubTask(currentSelectedTask.id, sub.id)} className="text-red-500 text-xs opacity-0 group-hover:opacity-100 font-bold">✕</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* PLANLAMA MODALİ */}
                        {planningDay && (
                            <div className="fixed inset-0 bg-black/30 flex items-center justify-center z-50">
                                <div className="bg-white rounded-lg p-5 w-[400px] max-h-[80vh] flex flex-col">
                                    <div className="flex justify-between mb-4 border-b pb-2">
                                        <h3 className="font-bold text-sm">{planningDay} Gününe Görev Ata</h3>
                                        <button onClick={() => setPlanningDay(null)}>✕</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-4">
                                        {tasks.map(task => (
                                            <div key={task.id} className="border p-2 bg-neutral-50 rounded">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-xs font-bold truncate max-w-[200px]">{task.title}</span>
                                                    <button onClick={() => addToWeeklyPlan(planningDay, task.id)} className="bg-neutral-800 text-white text-[10px] px-2 py-0.5 rounded">Ekle</button>
                                                </div>
                                                <div className="pl-2 border-l space-y-1">
                                                    {task.subTasks.map(sub => (
                                                        <div key={sub.id} className="flex justify-between text-[11px]">
                                                            <span>{sub.title}</span>
                                                            <button onClick={() => addToWeeklyPlan(planningDay, task.id, sub.id)} className="text-blue-600 font-semibold">Adımı Ekle</button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
