<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notion Style Task & Weekly Manager</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const defaultCategories = [
            { name: "Yazılım", color: "#e3e2e0", text: "#37352f" },
            { name: "Kitap", color: "#f1e0e0", text: "#5c2b29" },
            { name: "Spor", color: "#faebdd", text: "#6e361a" }
        ];

        const pastelColors = [
            { color: "#fdecc8", text: "#402c1b" }, { color: "#e8deee", text: "#412454" },
            { color: "#ffe2dd", text: "#5d1715" }, { color: "#d3e5ef", text: "#183347" },
            { color: "#dbeddb", text: "#1c3829" }, { color: "#fbf3db", text: "#694e1d" }
        ];

        const PRIORITIES = ["Çok Düşük", "Düşük", "Orta", "Yüksek", "Çok Yüksek"];
        const STATUSES = ["Not Started", "In Progress", "Done"];

        const priorityStyles = {
            "Çok Düşük": { bg: "#f0f9ff", border: "#bae6fd", text: "#0369a1" }, 
            "Düşük": { bg: "#e0f2fe", border: "#7dd3fc", text: "#0284c7" },     
            "Orta": { bg: "#fefce8", border: "#fde047", text: "#a16207" },     
            "Yüksek": { bg: "#fee2e2", border: "#fca5a5", text: "#b91c1c" },    
            "Çok Yüksek": { bg: "#fecaca", border: "#f87171", text: "#991b1b" } 
        };

        const statusStyles = {
            "Not Started": "bg-neutral-100 text-neutral-600 border-neutral-200",
            "In Progress": "bg-blue-100 text-blue-700 border-blue-200",
            "Done": "bg-green-100 text-green-700 border-green-200"
        };

        const DAYS_OF_WEEK = ["Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi", "Pazar"];
        const MONTH_NAMES = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];

        function App() {
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem("notion_categories");
                return saved ? JSON.parse(saved) : defaultCategories;
            });

            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem("notion_tasks");
                return saved ? JSON.parse(saved) : [];
            });

            const [weeklyPlan, setWeeklyPlan] = useState(() => {
                const saved = localStorage.getItem("notion_weekly_plan");
                const initial = { "Pazartesi": [], "Salı": [], "Çarşamba": [], "Perşembe": [], "Cuma": [], "Cumartesi": [], "Pazar": [] };
                return saved ? JSON.parse(saved) : initial;
            });

            const [habits, setHabits] = useState(() => {
                const saved = localStorage.getItem("notion_habits");
                return saved ? JSON.parse(saved) : [{ id: "habit-1", title: "Su İç (2.5L)" }];
            });

            const [habitLogs, setHabitLogs] = useState(() => {
                const saved = localStorage.getItem("notion_habit_logs");
                return saved ? JSON.parse(saved) : {};
            });

            const [activeView, setActiveView] = useState("tasks"); // "tasks", "weekly", "habits", "settings" eklendi
            const [selectedTaskId, setSelectedTaskId] = useState(null);
            const [filterCategory, setFilterCategory] = useState("Hepsi");
            const [planningDay, setPlanningDay] = useState(null);

            const [showAddForm, setShowAddForm] = useState(false);
            const [newTitle, setNewTitle] = useState("");
            const [newCategory, setNewCategory] = useState(categories[0]?.name || "");
            const [newDetails, setNewDetails] = useState("");
            const [newPriority, setNewPriority] = useState("Orta");
            const [newStatus, setNewStatus] = useState("Not Started");

            const [showAddCategory, setShowAddCategory] = useState(false);
            const [newCategoryName, setNewCategoryName] = useState("");

            const [selectedHabitId, setSelectedHabitId] = useState(habits[0]?.id || null);
            const [showAddHabit, setShowAddHabit] = useState(false);
            const [newHabitTitle, setNewHabitTitle] = useState("");
            const [currentMonth, setCurrentMonth] = useState(new Date());

            const dragItem = useRef(null);
            const dragOverItem = useRef(null);
            const fileInputRef = useRef(null); // Dosya yükleme referansı

            useEffect(() => { localStorage.setItem("notion_categories", JSON.stringify(categories)); }, [categories]);
            useEffect(() => { localStorage.setItem("notion_tasks", JSON.stringify(tasks)); }, [tasks]);
            useEffect(() => { localStorage.setItem("notion_weekly_plan", JSON.stringify(weeklyPlan)); }, [weeklyPlan]);
            useEffect(() => { localStorage.setItem("notion_habits", JSON.stringify(habits)); }, [habits]);
            useEffect(() => { localStorage.setItem("notion_habit_logs", JSON.stringify(habitLogs)); }, [habitLogs]);

            // ==========================================
            // YENİ: İÇE/DIŞA AKTAR (EXPORT/IMPORT) İŞLEMLERİ
            // ==========================================
            
            const exportData = () => {
                // Tüm dataları tek bir objede topluyoruz
                const backupData = {
                    categories,
                    tasks,
                    weeklyPlan,
                    habits,
                    habitLogs
                };
                
                // Objeyi string'e (metne) çevirip bir Blob oluşturuyoruz
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                
                // İnen dosyanın adı (örn: task-planner-backup-2026-07-09.json)
                const date = new Date().toISOString().slice(0, 10);
                downloadAnchorNode.setAttribute("download", `task-planner-backup-${date}.json`);
                
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        
                        // Dosyanın içindeki verileri okuyup State'lere yazıyoruz
                        if(importedData.categories) setCategories(importedData.categories);
                        if(importedData.tasks) setTasks(importedData.tasks);
                        if(importedData.weeklyPlan) setWeeklyPlan(importedData.weeklyPlan);
                        if(importedData.habits) setHabits(importedData.habits);
                        if(importedData.habitLogs) setHabitLogs(importedData.habitLogs);
                        
                        alert("Veriler başarıyla yüklendi! Çalışma alanınız güncellendi. 🎉");
                        event.target.value = ""; // Inputu sıfırla ki aynı dosyayı tekrar yükleyebilsin
                    } catch (error) {
                        alert("Hata: Yüklediğiniz dosya geçerli bir yedekleme (JSON) formatında değil.");
                    }
                };
                reader.readAsText(file);
            };

            // ==========================================

            const handleDragStart = (e, day, index) => { dragItem.current = { day, index }; setTimeout(() => { e.target.style.opacity = '0.4'; }, 0); };
            const handleDragEnter = (e, day, index) => { dragOverItem.current = { day, index }; };
            const handleDragEnd = (e) => { e.target.style.opacity = '1'; dragItem.current = null; dragOverItem.current = null; };
            const handleDrop = (e, targetDay) => {
                e.preventDefault();
                if (!dragItem.current) return;
                const sourceDay = dragItem.current.day;
                const sourceIndex = dragItem.current.index;
                let destIndex = weeklyPlan[targetDay].length;
                if (dragOverItem.current && dragOverItem.current.day === targetDay) { destIndex = dragOverItem.current.index; }
                if (sourceDay === targetDay && sourceIndex === destIndex) return;
                const newPlan = { ...weeklyPlan };
                const itemToMove = newPlan[sourceDay][sourceIndex];
                newPlan[sourceDay].splice(sourceIndex, 1);
                newPlan[targetDay].splice(destIndex, 0, itemToMove);
                setWeeklyPlan(newPlan);
            };

            const handleAddHabit = (e) => {
                e.preventDefault();
                if (!newHabitTitle.trim()) return;
                const newHabit = { id: "habit_" + Date.now(), title: newHabitTitle };
                setHabits([...habits, newHabit]);
                if (!selectedHabitId) setSelectedHabitId(newHabit.id);
                setNewHabitTitle(""); setShowAddHabit(false);
            };

            const handleDeleteHabit = (habitId) => {
                if (window.confirm("Bu alışkanlığı silmek istediğinize emin misiniz?")) {
                    setHabits(habits.filter(h => h.id !== habitId));
                    if (selectedHabitId === habitId) setSelectedHabitId(habits.length > 1 ? habits[0].id : null);
                }
            };

            const toggleHabitStatus = (habitId, dateStr) => {
                setHabitLogs(prev => {
                    const logs = prev[habitId] || {};
                    const currentStatus = logs[dateStr];
                    let nextStatus = "done";
                    if (currentStatus === "done") nextStatus = "failed";
                    else if (currentStatus === "failed") nextStatus = null;
                    const newLogs = { ...prev, [habitId]: { ...logs } };
                    if (nextStatus) { newLogs[habitId][dateStr] = nextStatus; } else { delete newLogs[habitId][dateStr]; }
                    return newLogs;
                });
            };

            const changeMonth = (offset) => { setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + offset, 1)); };

            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let firstDayIndex = new Date(year, month, 1).getDay();
            firstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
            const blankDays = Array.from({ length: firstDayIndex });
            const monthDays = Array.from({ length: daysInMonth }, (_, i) => i + 1);

            const handleAddCategory = (e) => {
                e.preventDefault();
                const trimmedName = newCategoryName.trim();
                if (!trimmedName) return;
                if (categories.find(c => c.name.toLowerCase() === trimmedName.toLowerCase())) { alert("Bu kategori zaten mevcut!"); return; }
                const randomColor = pastelColors[Math.floor(Math.random() * pastelColors.length)];
                setCategories([...categories, { name: trimmedName, color: randomColor.color, text: randomColor.text }]);
                setNewCategoryName(""); setShowAddCategory(false);
            };

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newTitle.trim()) return;
                const newTask = { id: "task_" + Date.now(), title: newTitle, category: newCategory || categories[0].name, details: newDetails, priority: newPriority, status: newStatus, isTotallyDone: false, subTasks: [] };
                setTasks([newTask, ...tasks]);
                setNewTitle(""); setNewDetails(""); setNewPriority("Orta"); setNewStatus("Not Started"); setShowAddForm(false);
            };

            const handleDeleteTask = (taskId) => {
                if (window.confirm("Bu görevi silmek istediğinize emin misiniz?")) {
                    setTasks(tasks.filter(t => t.id !== taskId));
                    if (selectedTaskId === taskId) setSelectedTaskId(null);
                    const updatedPlan = { ...weeklyPlan };
                    Object.keys(updatedPlan).forEach(day => { updatedPlan[day] = updatedPlan[day].filter(item => item.taskId !== taskId); });
                    setWeeklyPlan(updatedPlan);
                }
            };

            const updateTaskStatus = (taskId, status) => { setTasks(tasks.map(t => t.id === taskId ? { ...t, status } : t)); };
            const updateTaskPriority = (taskId, priority) => { setTasks(tasks.map(t => t.id === taskId ? { ...t, priority } : t)); };
            const updateTaskTitle = (taskId, title) => { setTasks(tasks.map(t => t.id === taskId ? { ...t, title } : t)); };
            const updateTaskDetails = (taskId, details) => { setTasks(tasks.map(t => t.id === taskId ? { ...t, details } : t)); };
            const toggleTotallyDone = (taskId) => { setTasks(tasks.map(t => t.id === taskId ? { ...t, isTotallyDone: !t.isTotallyDone } : t)); };

            const updateSubTaskTitle = (taskId, subTaskId, title) => { setTasks(tasks.map(task => task.id === taskId ? { ...task, subTasks: task.subTasks.map(sub => sub.id === subTaskId ? { ...sub, title } : sub) } : task)); };
            const toggleSubTask = (taskId, subTaskId) => { setTasks(tasks.map(task => task.id === taskId ? { ...task, subTasks: task.subTasks.map(sub => sub.id === subTaskId ? { ...sub, isCompleted: !sub.isCompleted } : sub) } : task)); };
            const addSubTask = (taskId, title) => { if (!title.trim()) return; setTasks(tasks.map(task => task.id === taskId ? { ...task, subTasks: [...task.subTasks, { id: "sub_" + Date.now(), title, isCompleted: false }] } : task)); };
            const deleteSubTask = (taskId, subTaskId) => {
                setTasks(tasks.map(task => task.id === taskId ? { ...task, subTasks: task.subTasks.filter(sub => sub.id !== subTaskId) } : task));
                const updatedPlan = { ...weeklyPlan };
                Object.keys(updatedPlan).forEach(day => { updatedPlan[day] = updatedPlan[day].filter(item => item.subTaskId !== subTaskId); });
                setWeeklyPlan(updatedPlan);
            };

            const addToWeeklyPlan = (day, taskId, subTaskId = null) => {
                const newItem = { id: "wp_" + Date.now(), taskId, subTaskId, status: "Not Started" };
                setWeeklyPlan({ ...weeklyPlan, [day]: [...weeklyPlan[day], newItem] });
                setPlanningDay(null);
            };

            const updateWeeklyItemStatus = (day, itemId, status) => { setWeeklyPlan({ ...weeklyPlan, [day]: weeklyPlan[day].map(item => item.id === itemId ? { ...item, status } : item) }); };
            const removeFromWeeklyPlan = (day, itemId) => { setWeeklyPlan({ ...weeklyPlan, [day]: weeklyPlan[day].filter(item => item.id !== itemId) }); };

            const currentSelectedTask = tasks.find(t => t.id === selectedTaskId);
            const activeHabit = habits.find(h => h.id === selectedHabitId);

            return (
                <div className="flex flex-col md:flex-row h-screen overflow-hidden select-none">
                    
                    {/* SIDEBAR */}
                    <div className="w-full md:w-64 bg-[#f3f3f2] md:border-r border-b border-[#e8e8e8] flex flex-col justify-between p-3 shrink-0 z-10">
                        <div>
                            <div className="hidden md:flex items-center space-x-2 px-2 py-3 mb-4 rounded-md hover:bg-[#e8e8e7] cursor-pointer transition-colors">
                                <div className="w-6 h-6 rounded-full bg-neutral-700 text-white flex items-center justify-center text-xs font-bold">🎯</div>
                                <span className="font-semibold text-sm text-[#37352f]">Çalışma Alanım</span>
                            </div>
                            
                            <nav className="flex md:flex-col space-x-2 md:space-x-0 md:space-y-1 overflow-x-auto pb-1 md:pb-0 scrollbar-hide">
                                <button onClick={() => setActiveView("tasks")} className={`btn-press flex-1 md:w-full flex items-center justify-center md:justify-start space-x-2 px-3 py-2 text-sm font-medium rounded-md transition-all whitespace-nowrap ${activeView === 'tasks' ? 'bg-[#e8e8e7] text-[#37352f]' : 'text-[#64625d] hover:bg-[#e8e8e7]'}`}>
                                    <span>Tüm Görevler</span>
                                </button>
                                <button onClick={() => setActiveView("weekly")} className={`btn-press flex-1 md:w-full flex items-center justify-center md:justify-start space-x-2 px-3 py-2 text-sm font-medium rounded-md transition-all whitespace-nowrap ${activeView === 'weekly' ? 'bg-[#e8e8e7] text-[#37352f]' : 'text-[#64625d] hover:bg-[#e8e8e7]'}`}>
                                    <span>Haftalık Plan</span>
                                </button>
                                <button onClick={() => { setActiveView("habits"); if(!selectedHabitId && habits.length > 0) setSelectedHabitId(habits[0].id); }} className={`btn-press flex-1 md:w-full flex items-center justify-center md:justify-start space-x-2 px-3 py-2 text-sm font-medium rounded-md transition-all whitespace-nowrap ${activeView === 'habits' ? 'bg-[#e8e8e7] text-[#37352f]' : 'text-[#64625d] hover:bg-[#e8e8e7]'}`}>
                                    <span>Alışkanlıklar</span>
                                </button>
                                {/* YENİ: Ayarlar Sekmesi */}
                                <button onClick={() => setActiveView("settings")} className={`btn-press flex-1 md:w-full flex items-center justify-center md:justify-start space-x-2 px-3 py-2 text-sm font-medium rounded-md transition-all whitespace-nowrap ${activeView === 'settings' ? 'bg-[#e8e8e7] text-[#37352f]' : 'text-[#64625d] hover:bg-[#e8e8e7]'}`}>
                                    <span>⚙️ Ayarlar</span>
                                </button>
                            </nav>
                        </div>
                    </div>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 flex flex-col overflow-hidden relative bg-[#fbfbfa]">
                        
                        {/* VIEW 1: TÜM GÖREVLER */}
                        {activeView === "tasks" && (
                            <div className="flex-1 overflow-y-auto p-4 md:p-10 max-w-5xl w-full mx-auto animate-modal">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 space-y-4 md:space-y-0">
                                    <h1 className="text-2xl md:text-3xl font-bold tracking-tight text-[#37352f]">🎯 Tüm Görev Havuzu</h1>
                                    <button onClick={() => setShowAddForm(!showAddForm)} className="w-full md:w-auto btn-press bg-[#2eaadc] hover:bg-[#1c92c1] text-white text-sm font-medium px-3 py-2 md:py-1.5 rounded shadow-sm transition-all">
                                        + Yeni Görev
                                    </button>
                                </div>

                                <div className="flex flex-wrap items-center gap-2 mb-6 border-b border-[#e8e8e8] pb-3">
                                    <button onClick={() => setFilterCategory("Hepsi")} className={`btn-press px-3 py-1 rounded text-xs font-medium transition-all ${filterCategory === "Hepsi" ? "bg-neutral-800 text-white" : "bg-neutral-100 text-neutral-600 hover:bg-neutral-200"}`}>Hepsi</button>
                                    
                                    {categories.map(cat => (
                                        <button key={cat.name} onClick={() => setFilterCategory(cat.name)} style={{ backgroundColor: filterCategory === cat.name ? cat.text : cat.color, color: filterCategory === cat.name ? '#ffffff' : cat.text }} className="btn-press px-3 py-1 rounded text-xs font-medium transition-all opacity-90 hover:opacity-100">
                                            {cat.name}
                                        </button>
                                    ))}

                                    {showAddCategory ? (
                                        <form onSubmit={handleAddCategory} className="flex items-center space-x-1 ml-0 md:ml-2 mt-2 md:mt-0 animate-modal">
                                            <input type="text" autoFocus value={newCategoryName} onChange={e => setNewCategoryName(e.target.value)} placeholder="Kategori Adı..." className="border border-neutral-300 rounded px-2 py-1 text-xs outline-none focus:border-neutral-500 w-24 md:w-32" />
                                            <button type="submit" className="btn-press text-xs bg-neutral-200 hover:bg-neutral-300 px-2 py-1 rounded font-medium transition-all">Ekle</button>
                                            <button type="button" onClick={() => setShowAddCategory(false)} className="btn-press text-xs text-neutral-500 hover:text-neutral-800 px-1">✕</button>
                                        </form>
                                    ) : (
                                        <button onClick={() => setShowAddCategory(true)} className="btn-press px-3 py-1 mt-2 md:mt-0 ml-0 md:ml-2 border border-dashed border-neutral-300 text-neutral-500 rounded text-xs font-medium hover:bg-neutral-50 transition-all">
                                            + Kategori Ekle
                                        </button>
                                    )}
                                </div>

                                {showAddForm && (
                                    <form onSubmit={handleAddTask} className="bg-white border border-[#e8e8e8] rounded-lg p-4 md:p-5 mb-6 shadow-sm space-y-4 animate-modal">
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                            <div className="md:col-span-2">
                                                <label className="block text-xs font-medium text-neutral-500 mb-1">Görev Adı</label>
                                                <input type="text" value={newTitle} onChange={e => setNewTitle(e.target.value)} className="w-full border border-neutral-200 rounded px-3 py-2 md:py-1.5 text-sm focus:outline-none focus:border-blue-500 transition-colors" required />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-neutral-500 mb-1">Kategori</label>
                                                <select value={newCategory} onChange={e => setNewCategory(e.target.value)} className="w-full border border-neutral-200 rounded px-3 py-2 md:py-1.5 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                                                    {categories.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-neutral-500 mb-1">Öncelik</label>
                                                <select value={newPriority} onChange={e => setNewPriority(e.target.value)} className="w-full border border-neutral-200 rounded px-3 py-2 md:py-1.5 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                                                    {PRIORITIES.map(p => <option key={p} value={p}>{p}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-neutral-500 mb-1">Detaylar / Notlar</label>
                                            <textarea value={newDetails} onChange={e => setNewDetails(e.target.value)} rows="2" className="w-full border border-neutral-200 rounded px-3 py-2 md:py-1.5 text-sm focus:outline-none focus:border-blue-500 resize-none transition-colors"></textarea>
                                        </div>
                                        <div className="flex justify-end space-x-2">
                                            <button type="button" onClick={() => setShowAddForm(false)} className="btn-press px-3 py-2 md:py-1.5 border border-neutral-200 text-neutral-600 text-sm rounded hover:bg-neutral-50 transition-colors">Vazgeç</button>
                                            <button type="submit" className="btn-press px-4 py-2 md:py-1.5 bg-[#2eaadc] text-white text-sm rounded hover:bg-[#1c92c1] transition-colors">Havuzuna Ekle</button>
                                        </div>
                                    </form>
                                )}

                                <div className="space-y-2">
                                    {tasks.filter(t => filterCategory === "Hepsi" || t.category === filterCategory).map(task => {
                                        const catConfig = categories.find(c => c.name === task.category) || { color: "#e3e2e0", text: "#37352f" };
                                        const taskStatus = task.status || "Not Started";
                                        const taskPriority = task.priority || "Orta";
                                        const priorityColor = priorityStyles[taskPriority].text;
                                        const isDone = task.isTotallyDone || false;

                                        return (
                                            <div 
                                                key={task.id} 
                                                onClick={() => setSelectedTaskId(task.id)} 
                                                className={`task-card-anim group flex flex-col md:flex-row items-start md:items-center justify-between p-3 bg-white border ${isDone ? 'border-green-300 bg-green-50/40 opacity-80' : 'border-[#e8e8e8]'} rounded-md shadow-sm cursor-pointer gap-2 md:gap-0`}
                                            >
                                                <div className="flex items-center space-x-3 w-full md:w-auto truncate flex-1">
                                                    <input 
                                                        type="checkbox" checked={isDone}
                                                        onClick={(e) => e.stopPropagation()} 
                                                        onChange={(e) => { e.stopPropagation(); toggleTotallyDone(task.id); }}
                                                        className="master-checkbox shrink-0" title="Görevi Tamamen Bitir"
                                                    />
                                                    <span style={{ backgroundColor: catConfig.color, color: catConfig.text }} className={`px-2 py-0.5 rounded text-[10px] md:text-xs font-semibold shrink-0 transition-opacity ${isDone ? 'opacity-60' : ''}`}>{task.category}</span>
                                                    <span className={`font-medium text-sm truncate transition-all ${isDone ? 'line-through text-neutral-400' : 'text-[#37352f] group-hover:text-blue-600'}`}>{task.title}</span>
                                                </div>
                                                
                                                <div className="flex items-center space-x-2 md:space-x-3 shrink-0 w-full md:w-auto justify-between md:justify-end pl-8 md:pl-0">
                                                    {!isDone && (
                                                        <div className="flex space-x-2">
                                                            <select 
                                                                value={taskStatus} onClick={(e) => e.stopPropagation()} 
                                                                onChange={(e) => { e.stopPropagation(); updateTaskStatus(task.id, e.target.value); }}
                                                                className={`btn-press status-select text-[10px] md:text-[11px] font-semibold border rounded-full px-2 py-0.5 outline-none cursor-pointer transition-colors ${statusStyles[taskStatus]}`}
                                                            >
                                                                {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                                            </select>
                                                            <span style={{ color: priorityColor }} className="text-[10px] md:text-[11px] font-bold border border-transparent px-1 mt-0.5">{taskPriority}</span>
                                                        </div>
                                                    )}
                                                    {isDone && <span className="text-xs font-bold text-green-600 px-2 animate-modal">TAMAMLANDI 🎉</span>}
                                                    <button onClick={(e) => { e.stopPropagation(); handleDeleteTask(task.id); }} className="btn-press md:opacity-0 group-hover:opacity-100 text-red-500 hover:text-red-700 text-xs font-semibold ml-2 transition-all">Sil</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* VIEW 2: HAFTALIK PLAN */}
                        {activeView === "weekly" && (
                            <div className="flex-1 overflow-x-auto overflow-y-auto p-4 md:p-10 animate-modal">
                                <h1 className="text-2xl md:text-3xl font-bold tracking-tight text-[#37352f] mb-4 md:mb-6 max-w-7xl mx-auto">📅 Haftalık Çizelge</h1>
                                <div className="grid grid-cols-1 lg:grid-cols-7 gap-4 lg:gap-3 max-w-7xl mx-auto">
                                    {DAYS_OF_WEEK.map(day => (
                                        <div 
                                            key={day} 
                                            onDragOver={(e) => e.preventDefault()}
                                            onDrop={(e) => handleDrop(e, day)}
                                            className="bg-[#f7f7f5] rounded-xl p-3 border border-[#e8e8e8] flex flex-col h-auto min-h-[150px] lg:h-[calc(100vh-180px)] transition-colors hover:border-neutral-300"
                                        >
                                            <div className="flex justify-between items-center mb-3 pb-1 border-b border-neutral-200">
                                                <span className="font-semibold text-sm text-neutral-700">{day}</span>
                                                <button onClick={() => setPlanningDay(day)} className="btn-press w-6 h-6 md:w-5 md:h-5 rounded hover:bg-neutral-200 flex items-center justify-center text-neutral-500 text-lg md:text-sm transition-colors">+</button>
                                            </div>
                                            
                                            <div className="space-y-2 flex-1 lg:overflow-y-auto pr-1 pb-2 lg:pb-10">
                                                {weeklyPlan[day]?.map((item, index) => {
                                                    const parentTask = tasks.find(t => t.id === item.taskId);
                                                    if (!parentTask) return null;
                                                    
                                                    const subTask = item.subTaskId ? parentTask.subTasks.find(s => s.id === item.subTaskId) : null;
                                                    const itemStatus = item.status || "Not Started";
                                                    const taskPriority = parentTask.priority || "Orta";
                                                    const pStyle = priorityStyles[taskPriority];
                                                    const isTotallyDone = parentTask.isTotallyDone;

                                                    return (
                                                        <div 
                                                            key={item.id} 
                                                            onClick={() => setSelectedTaskId(parentTask.id)}
                                                            draggable
                                                            onDragStart={(e) => handleDragStart(e, day, index)}
                                                            onDragEnter={(e) => handleDragEnter(e, day, index)}
                                                            onDragEnd={handleDragEnd}
                                                            onDragOver={(e) => e.preventDefault()}
                                                            style={{ backgroundColor: pStyle.bg, borderColor: pStyle.border }}
                                                            className={`task-card-anim draggable-card border rounded p-3 md:p-2.5 shadow-sm group relative flex flex-col ${isTotallyDone ? 'opacity-50 grayscale' : ''}`}
                                                        >
                                                            <button 
                                                                onClick={(e) => { e.stopPropagation(); removeFromWeeklyPlan(day, item.id); }} 
                                                                className="btn-press absolute top-2 right-2 md:top-1 md:right-1 md:opacity-0 group-hover:opacity-100 text-red-500 text-sm md:text-xs bg-white rounded-full w-5 h-5 md:w-4 md:h-4 flex items-center justify-center shadow transition-all"
                                                            >✕</button>
                                                            
                                                            {subTask ? (
                                                                <div className="pr-5 md:pr-4 break-words mb-2 pointer-events-none">
                                                                    <div className={`text-[11px] md:text-[10px] opacity-60 line-through mb-0.5`}>{parentTask.title}</div>
                                                                    <div className={`text-sm md:text-xs font-semibold text-[#37352f] leading-snug transition-all ${isTotallyDone ? 'line-through' : ''}`}>
                                                                        🔹 {subTask.title}
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className={`text-sm md:text-xs font-semibold text-[#37352f] leading-snug pr-5 md:pr-4 break-words mb-2 pointer-events-none transition-all ${isTotallyDone ? 'line-through' : ''}`}>
                                                                    📌 {parentTask.title}
                                                                </div>
                                                            )}

                                                            <div className="mt-auto pt-2 md:pt-1 border-t border-black/5 flex justify-between items-center">
                                                                {isTotallyDone ? (
                                                                    <span className="text-[10px] md:text-[9px] font-bold text-green-700">TÜMÜ BİTTİ</span>
                                                                ) : (
                                                                    <select 
                                                                        value={itemStatus} onClick={(e) => e.stopPropagation()}
                                                                        onChange={(e) => { e.stopPropagation(); updateWeeklyItemStatus(day, item.id, e.target.value); }}
                                                                        className={`status-select text-[10px] md:text-[9px] font-bold border rounded-full px-2 md:px-1.5 py-1 md:py-0.5 outline-none cursor-pointer transition-colors ${statusStyles[itemStatus]}`}
                                                                    >
                                                                        {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                                                    </select>
                                                                )}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* VIEW 3: ALIŞKANLIKLAR (HABITS) */}
                        {activeView === "habits" && (
                            <div className="flex-1 flex flex-col md:flex-row overflow-hidden animate-modal">
                                <div className="w-full md:w-72 bg-white border-b md:border-b-0 md:border-r border-neutral-200 p-4 md:p-6 overflow-y-auto shrink-0 max-h-64 md:max-h-full">
                                    <h2 className="text-lg font-bold text-[#37352f] mb-4">🌱 Alışkanlıklarım</h2>
                                    
                                    {showAddHabit ? (
                                        <form onSubmit={handleAddHabit} className="mb-4 animate-modal">
                                            <input 
                                                type="text" autoFocus value={newHabitTitle} onChange={e => setNewHabitTitle(e.target.value)} 
                                                placeholder="Örn: 30 Dk Kitap Oku" 
                                                className="w-full border border-neutral-300 rounded px-3 py-2 text-sm outline-none focus:border-blue-500 mb-2" 
                                            />
                                            <div className="flex space-x-2">
                                                <button type="submit" className="flex-1 bg-neutral-800 text-white text-xs py-2 rounded hover:bg-neutral-700">Oluştur</button>
                                                <button type="button" onClick={() => setShowAddHabit(false)} className="px-3 bg-neutral-100 text-neutral-600 text-xs py-2 rounded hover:bg-neutral-200">İptal</button>
                                            </div>
                                        </form>
                                    ) : (
                                        <button onClick={() => setShowAddHabit(true)} className="w-full border border-dashed border-neutral-300 text-neutral-500 text-sm font-medium py-2 rounded hover:bg-neutral-50 transition-colors mb-4">
                                            + Yeni Ekle
                                        </button>
                                    )}

                                    <div className="space-y-1">
                                        {habits.length === 0 ? (
                                            <p className="text-xs text-neutral-400 italic">Henüz bir alışkanlık oluşturmadın.</p>
                                        ) : (
                                            habits.map(habit => (
                                                <div 
                                                    key={habit.id} onClick={() => setSelectedHabitId(habit.id)}
                                                    className={`group flex items-center justify-between px-3 py-3 md:py-2 rounded-md cursor-pointer transition-colors ${selectedHabitId === habit.id ? 'bg-blue-50 text-blue-700 font-semibold' : 'hover:bg-neutral-100 text-neutral-700'}`}
                                                >
                                                    <span className="text-sm truncate">{habit.title}</span>
                                                    <button onClick={(e) => { e.stopPropagation(); handleDeleteHabit(habit.id); }} className="md:opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 text-xs transition-opacity p-1">✕</button>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                                <div className="flex-1 bg-[#fbfbfa] p-4 md:p-10 overflow-y-auto">
                                    {!activeHabit ? (
                                        <div className="h-full flex flex-col items-center justify-center text-neutral-400">
                                            <div className="text-4xl mb-4">📅</div>
                                            <p className="text-center text-sm md:text-base">Takvimini görmek için bir alışkanlık seç veya yeni bir tane oluştur.</p>
                                        </div>
                                    ) : (
                                        <div className="max-w-4xl mx-auto">
                                            <div className="flex flex-col md:flex-row justify-between items-center mb-6 space-y-4 md:space-y-0">
                                                <div className="text-center md:text-left">
                                                    <h1 className="text-2xl md:text-3xl font-bold tracking-tight text-[#37352f]">{activeHabit.title}</h1>
                                                    <p className="text-xs md:text-sm text-neutral-500 mt-1">İlgili günün üzerine tıklayarak durumunu belirtebilirsin.</p>
                                                </div>
                                                
                                                <div className="flex items-center space-x-4 bg-white border border-neutral-200 rounded-md p-1 shadow-sm w-full md:w-auto justify-center">
                                                    <button onClick={() => changeMonth(-1)} className="btn-press px-4 md:px-3 py-2 md:py-1 hover:bg-neutral-100 rounded text-neutral-600 font-bold">&lt;</button>
                                                    <span className="text-sm font-semibold text-neutral-700 w-32 text-center">
                                                        {MONTH_NAMES[month]} {year}
                                                    </span>
                                                    <button onClick={() => changeMonth(1)} className="btn-press px-4 md:px-3 py-2 md:py-1 hover:bg-neutral-100 rounded text-neutral-600 font-bold">&gt;</button>
                                                </div>
                                            </div>

                                            <div className="bg-white border border-neutral-200 rounded-xl shadow-sm overflow-hidden text-xs md:text-base">
                                                <div className="grid grid-cols-7 bg-neutral-50 border-b border-neutral-200">
                                                    {DAYS_OF_WEEK.map(day => (
                                                        <div key={day} className="py-2 md:py-3 text-center text-[10px] md:text-xs font-bold text-neutral-500 uppercase tracking-wider">{day.slice(0,3)}</div>
                                                    ))}
                                                </div>
                                                
                                                <div className="grid grid-cols-7 gap-px bg-neutral-200">
                                                    {blankDays.map((_, i) => (
                                                        <div key={`blank-${i}`} className="bg-white min-h-[60px] md:min-h-[100px]"></div>
                                                    ))}
                                                    
                                                    {monthDays.map(d => {
                                                        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                                                        const status = habitLogs[activeHabit.id]?.[dateStr];
                                                        
                                                        let boxStyle = "bg-white hover:bg-neutral-50 text-neutral-700";
                                                        let icon = "";
                                                        
                                                        if (status === "done") { boxStyle = "bg-green-500 text-white font-bold"; icon = "✅"; } 
                                                        else if (status === "failed") { boxStyle = "bg-red-500 text-white font-bold"; icon = "❌"; }

                                                        const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();

                                                        return (
                                                            <div 
                                                                key={d} onClick={() => toggleHabitStatus(activeHabit.id, dateStr)}
                                                                className={`min-h-[60px] md:min-h-[100px] p-1 md:p-2 flex flex-col items-center justify-center cursor-pointer transition-colors relative ${boxStyle}`}
                                                            >
                                                                <span className={`text-sm md:text-lg ${isToday && !status ? 'bg-neutral-800 text-white rounded-full w-6 h-6 md:w-8 md:h-8 flex items-center justify-center' : ''}`}>
                                                                    {d}
                                                                </span>
                                                                {icon && <span className="mt-1 md:mt-2 text-sm md:text-xl animate-modal">{icon}</span>}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* YENİ VIEW 4: AYARLAR VE YEDEKLEME (EXPORT / IMPORT) */}
                        {activeView === "settings" && (
                            <div className="flex-1 overflow-y-auto p-4 md:p-10 max-w-3xl w-full mx-auto animate-modal">
                                <h1 className="text-2xl md:text-3xl font-bold tracking-tight text-[#37352f] mb-2">⚙️ Ayarlar & Veri Yönetimi</h1>
                                <p className="text-sm text-neutral-500 mb-8">
                                    Verileriniz cihazınızın hafızasında (LocalStorage) tutulmaktadır. Verilerinizi kaybetmemek veya farklı bir cihaza (örn: telefona) aktarmak için bu araçları kullanabilirsiniz.
                                </p>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    
                                    {/* Dışa Aktar (Export) Kartı */}
                                    <div className="bg-white border border-neutral-200 p-6 rounded-xl shadow-sm flex flex-col items-center text-center">
                                        <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center text-3xl mb-4">
                                            📥
                                        </div>
                                        <h3 className="font-bold text-[#37352f] mb-2">Verileri Dışa Aktar (Yedekle)</h3>
                                        <p className="text-xs text-neutral-500 mb-6 flex-1">
                                            Tüm görevlerinizi, haftalık planlarınızı ve alışkanlıklarınızı tek bir .json dosyası olarak bilgisayarınıza veya telefonunuza indirin.
                                        </p>
                                        <button 
                                            onClick={exportData}
                                            className="btn-press w-full bg-neutral-800 text-white font-medium py-2.5 rounded hover:bg-neutral-700 transition-colors"
                                        >
                                            Verilerimi İndir
                                        </button>
                                    </div>

                                    {/* İçe Aktar (Import) Kartı */}
                                    <div className="bg-white border border-neutral-200 p-6 rounded-xl shadow-sm flex flex-col items-center text-center">
                                        <div className="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-3xl mb-4">
                                            📤
                                        </div>
                                        <h3 className="font-bold text-[#37352f] mb-2">Verileri İçe Aktar (Yükle)</h3>
                                        <p className="text-xs text-neutral-500 mb-6 flex-1">
                                            Önceden indirdiğiniz veya başka cihazdan gönderdiğiniz .json formatındaki yedek dosyasını buraya yükleyerek çalışma alanınızı geri getirin.
                                        </p>
                                        
                                        {/* Gizli Dosya Seçici */}
                                        <input 
                                            type="file" 
                                            accept=".json"
                                            ref={fileInputRef}
                                            onChange={importData}
                                            className="hidden"
                                        />
                                        
                                        <button 
                                            onClick={() => fileInputRef.current.click()}
                                            className="btn-press w-full bg-green-600 text-white font-medium py-2.5 rounded hover:bg-green-700 transition-colors"
                                        >
                                            Yedek Dosyası Seç (.json)
                                        </button>
                                    </div>

                                </div>
                            </div>
                        )}

                        {/* SIDE PEEK PANELİ (Tasks İçin) */}
                        <div className={`fixed top-0 right-0 h-full w-full md:w-[400px] bg-white border-l border-[#e8e8e8] shadow-2xl transform transition-transform duration-300 z-50 flex flex-col ${currentSelectedTask && activeView !== "habits" && activeView !== "settings" ? 'translate-x-0' : 'translate-x-full'}`}>
                            {currentSelectedTask && (
                                <div className="flex-1 flex flex-col overflow-hidden p-4 md:p-6">
                                    <div className="flex justify-between items-center mb-4 mt-2 md:mt-0">
                                        <div className="flex space-x-2">
                                            <select 
                                                value={currentSelectedTask.status || "Not Started"} onChange={(e) => updateTaskStatus(currentSelectedTask.id, e.target.value)} disabled={currentSelectedTask.isTotallyDone}
                                                className={`btn-press status-select text-xs font-semibold border rounded-md px-2 py-1.5 md:py-1 outline-none cursor-pointer transition-colors ${statusStyles[currentSelectedTask.status || "Not Started"]} ${currentSelectedTask.isTotallyDone ? 'opacity-50' : ''}`}
                                            >
                                                {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>

                                            <select 
                                                value={currentSelectedTask.priority || "Orta"} onChange={(e) => updateTaskPriority(currentSelectedTask.id, e.target.value)}
                                                className="btn-press text-xs font-semibold border border-neutral-200 rounded-md px-2 py-1.5 md:py-1 outline-none cursor-pointer bg-neutral-50 transition-colors"
                                            >
                                                {PRIORITIES.map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                        </div>
                                        <button onClick={() => setSelectedTaskId(null)} className="btn-press bg-neutral-100 md:bg-transparent rounded-full w-8 h-8 md:w-auto md:h-auto flex items-center justify-center text-neutral-600 hover:text-neutral-900 md:text-xl transition-colors">✕</button>
                                    </div>

                                    <div className="flex items-center space-x-3 mb-4 bg-green-50 p-3 rounded-md border border-green-200 transition-all">
                                        <input type="checkbox" checked={currentSelectedTask.isTotallyDone || false} onChange={() => toggleTotallyDone(currentSelectedTask.id)} className="master-checkbox shrink-0" />
                                        <span className="text-xs font-bold text-green-800">Bu Görevi Tamamen Bitir</span>
                                    </div>

                                    <input 
                                        type="text" value={currentSelectedTask.title} onChange={(e) => updateTaskTitle(currentSelectedTask.id, e.target.value)}
                                        className={`text-xl md:text-2xl font-bold mb-2 w-full bg-transparent border border-transparent hover:border-neutral-200 focus:bg-white focus:border-blue-400 focus:outline-none rounded px-1 -ml-1 transition-all ${currentSelectedTask.isTotallyDone ? 'line-through text-neutral-400' : 'text-[#37352f]'}`}
                                    />
                                    
                                    <textarea 
                                        value={currentSelectedTask.details} onChange={(e) => updateTaskDetails(currentSelectedTask.id, e.target.value)} placeholder="Görev detaylarını buraya ekleyebilirsin..."
                                        className="w-full text-sm text-neutral-500 bg-neutral-50 p-3 rounded mb-6 border border-transparent hover:border-neutral-200 focus:bg-white focus:border-blue-400 focus:outline-none transition-all inline-textarea min-h-[80px]"
                                    />
                                    
                                    <h3 className="text-xs font-bold uppercase text-neutral-400 mb-2">📋 Alt Adımlar</h3>
                                    <input type="text" placeholder="+ Alt adım ekle (Enter)" onKeyDown={(e) => { if (e.key === 'Enter') { addSubTask(currentSelectedTask.id, e.target.value); e.target.value = ""; } }} className="w-full bg-neutral-50 border border-neutral-200 rounded px-3 py-2 md:py-1.5 text-xs mb-3 focus:outline-none focus:border-blue-400 transition-colors" />
                                    
                                    <div className="flex-1 overflow-y-auto space-y-1.5 pr-1 pb-10">
                                        {currentSelectedTask.subTasks.map(sub => (
                                            <div key={sub.id} className="flex items-center justify-between p-2 rounded hover:bg-neutral-50 group border border-transparent focus-within:border-neutral-200 focus-within:bg-white transition-all">
                                                <div className="flex items-center space-x-3 flex-1">
                                                    <input type="checkbox" checked={sub.isCompleted} onChange={() => toggleSubTask(currentSelectedTask.id, sub.id)} className="rounded cursor-pointer mt-0.5 w-4 h-4 md:w-auto md:h-auto" />
                                                    <input 
                                                        type="text" value={sub.title} onChange={(e) => updateSubTaskTitle(currentSelectedTask.id, sub.id, e.target.value)}
                                                        className={`text-sm md:text-xs bg-transparent border-none focus:outline-none w-full transition-all ${sub.isCompleted ? 'line-through text-neutral-400' : 'text-neutral-700'}`}
                                                    />
                                                </div>
                                                <button onClick={() => deleteSubTask(currentSelectedTask.id, sub.id)} className="btn-press text-red-500 text-lg md:text-xs md:opacity-0 group-hover:opacity-100 font-bold ml-2 transition-all p-1">✕</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* PLANLAMA MODALİ (Tasks İçin) */}
                        {planningDay && (
                            <div className="animate-overlay fixed inset-0 bg-black/50 md:bg-black/30 flex items-end md:items-center justify-center z-50">
                                <div className="animate-modal bg-white rounded-t-2xl md:rounded-lg p-5 w-full md:w-[400px] h-[70vh] md:max-h-[80vh] flex flex-col shadow-2xl">
                                    <div className="flex justify-between items-center mb-4 border-b pb-3">
                                        <h3 className="font-bold text-base md:text-sm">{planningDay} Gününe Görev Ata</h3>
                                        <button onClick={() => setPlanningDay(null)} className="btn-press bg-neutral-100 md:bg-transparent rounded-full w-8 h-8 md:w-auto md:h-auto flex items-center justify-center text-neutral-600 hover:text-neutral-900 transition-colors">✕</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-4 pb-10">
                                        {tasks.filter(t => !t.isTotallyDone).length === 0 ? (
                                            <p className="text-sm md:text-xs text-center py-4 text-neutral-400">Atanacak aktif görev yok.</p>
                                        ) : (
                                            tasks.filter(t => !t.isTotallyDone).map(task => (
                                                <div key={task.id} className="border border-neutral-200 p-3 md:p-2 bg-neutral-50 rounded hover:border-neutral-300 transition-colors">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <span className="text-sm md:text-xs font-bold truncate pr-2 flex-1">{task.title}</span>
                                                        <button onClick={() => addToWeeklyPlan(planningDay, task.id)} className="btn-press shrink-0 bg-neutral-800 text-white text-xs md:text-[10px] px-3 md:px-2 py-1.5 md:py-0.5 rounded hover:bg-neutral-700 transition-colors">Ana Görevi Ekle</button>
                                                    </div>
                                                    <div className="pl-3 md:pl-2 border-l-2 border-neutral-300 space-y-2 md:space-y-1 mt-2">
                                                        {task.subTasks.map(sub => (
                                                            <div key={sub.id} className="flex justify-between text-xs md:text-[11px] items-center">
                                                                <span className="truncate pr-2">{sub.title}</span>
                                                                <button onClick={() => addToWeeklyPlan(planningDay, task.id, sub.id)} className="btn-press shrink-0 text-blue-600 font-semibold hover:underline transition-all py-1">Adımı Ekle</button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
